<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Chain Reaction: Idle</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/style.css">
</head>
<body>

<canvas id="c"></canvas>

<!-- ── HUD ──────────────────────────────────────────────────────── -->
<div id="hud">
  <button class="hud-item hud-coins-btn" id="hud-coins-btn" aria-label="Stats">
    <span class="hud-coin-icon">◆</span>
    <span class="hud-value" id="hud-coins">0</span>
    <span class="hud-expand-arrow" id="hud-expand-arrow">›</span>
  </button>
  <div class="hud-item" id="hud-chain-wrap">
    <span class="hud-label">Chain</span>
    <span class="hud-value" id="hud-chain">×1.00</span>
  </div>
</div>

<!-- ── Stats mini panel ─────────────────────────────────────────── -->
<div id="stats-mini" class="hidden">
  <div class="stats-mini-grid">
    <div class="smt">
      <span class="smt-val" id="smt-popped">–</span>
      <span class="smt-lbl">Popped</span>
    </div>
    <div class="smt">
      <span class="smt-val" id="smt-chain">–</span>
      <span class="smt-lbl">Best Chain</span>
    </div>
    <div class="smt">
      <span class="smt-val" id="smt-payout">–</span>
      <span class="smt-lbl">Best Payout</span>
    </div>
    <div class="smt">
      <span class="smt-val" id="smt-earned">–</span>
      <span class="smt-lbl">Run Earned</span>
    </div>
  </div>
  <button id="stats-full-btn" class="stats-full-btn">Full Stats ›</button>
</div>

<!-- ── Full stats screen ────────────────────────────────────────── -->
<div id="stats-screen" class="hidden">
  <div class="stats-screen-header">
    <span class="stats-screen-title">◆ Stats</span>
    <button id="stats-screen-close" aria-label="Close">&#215;</button>
  </div>
  <div class="stats-tab-bar">
    <button class="stats-tab active" data-tab="run">Run</button>
    <button class="stats-tab" data-tab="alltime">All-Time</button>
    <button class="stats-tab" data-tab="bycolor">By Color</button>
  </div>
  <div id="stats-tab-body"></div>
</div>

<!-- ── Shop panel (full-screen overlay) ─────────────────────────── -->
<div id="shop-panel" class="hidden">
  <div class="shop-inner">
    <div class="shop-header">
      <div class="shop-title-wrap">
        <span class="shop-header-icon">&#11042;</span>
        <span class="shop-title">Upgrades</span>
      </div>
      <button id="shop-close" aria-label="Close">&#215;</button>
    </div>
    <div id="shop-body"><!-- built by JS --></div>
  </div>
</div>

<!-- ── Quick-buy bar (always visible, bottom) ───────────────────── -->
<div id="quick-buy-bar">
  <button id="qb-ball" class="qb-btn">
    <span class="qb-btn-icon" id="qb-ball-icon">&#9670;</span>
    <span class="qb-btn-label" id="qb-ball-label">BALL</span>
    <span class="qb-btn-cost" id="qb-ball-cost">&#9670; –</span>
  </button>
  <button id="qb-buy" class="qb-btn">
    <span class="qb-btn-icons">
      <span class="qb-btn-icon" id="qb-buy-ball-icon">&#9670;</span>
      <span class="qb-btn-icon" id="qb-buy-icon">&#9889;</span>
    </span>
    <span class="qb-btn-label" id="qb-buy-label">BUY</span>
    <span class="qb-btn-cost" id="qb-buy-cost">&#9670; –</span>
  </button>
  <button id="qb-store" class="qb-btn qb-btn-store">
    <span class="qb-btn-icon" id="qb-store-arrow">&#9650;</span>
    <span class="qb-btn-label">UPGRADES</span>
  </button>
</div>

<!-- ── Shop toggle (hidden — replaced by quick-buy bar) ─────────── -->
<button id="shop-toggle" aria-label="Upgrades" style="display:none">&#9650;</button>

<!-- ── Dev panel ────────────────────────────────────────────────── -->
<div id="dev-panel" class="hidden">
  <div class="dev-header">
    Dev
    <button id="dev-close" aria-label="Close">&#215;</button>
  </div>
  <div class="dev-body">
    <div class="dev-row-btns">
      <button id="dev-add-coins" class="dev-small-btn">&#9670; +1 000</button>
      <button id="dev-reset"     class="dev-small-btn">&#8635; Reset</button>
    </div>
    <div class="dev-row-btns">
      <button id="dev-prestige"  class="dev-small-btn">&#9733; Prestige</button>
    </div>
    <div class="dev-row-btns">
      <button id="dev-reset-intro" class="dev-small-btn">&#8617; Intro</button>
    </div>
    <div class="dev-row-btns">
      <button id="dev-free-upgrades" class="dev-small-btn">&#10022; Free Upgrades</button>
    </div>
  </div>
</div>

<button id="dev-toggle" aria-label="Dev">&#9881;</button>

<!-- ── Debug overlay (toggle with D key) ────────────────────────── -->
<div id="debug-overlay" class="hidden"></div>

<script type="module" src="/src/main.js"></script>
</body>
</html>
