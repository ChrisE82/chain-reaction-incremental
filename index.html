<!DOCTYPE html>
<html lang="en" data-theme="neon">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Chain Reaction: Idle</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/style.css">
</head>
<body>

<canvas id="c"></canvas>

<!-- ── HUD ──────────────────────────────────────────────────────── -->
<div id="hud">
  <!-- Row 1: Clicks | Score + Goal | Refresh -->
  <div class="hud-row hud-primary">

    <div class="hud-tile">
      <span class="hud-tile-lbl">Clicks</span>
      <span class="hud-tile-val" id="hud-clicks">5</span>
    </div>

    <button class="hud-score-btn" id="hud-coins-btn" aria-label="Stats">
      <div class="hud-score-row">
        <span class="hud-coin-icon">&#9670;</span>
        <span class="hud-score-val" id="hud-coins">0</span>
      </div>
      <div class="hud-goal-row">
        <span class="hud-goal-lbl">Goal</span>
        <span class="hud-goal-val" id="hud-goal-max">200</span>
      </div>
      <span class="hud-expand-arrow" id="hud-expand-arrow">&#9662;</span>
    </button>

    <button class="hud-tile hud-tile-btn" id="btn-refresh">
      <span class="hud-tile-lbl">Refresh &#8635;</span>
      <span class="hud-tile-val" id="hud-refreshes">5</span>
    </button>

  </div>

  <!-- Row 2: Round number | Chain multiplier | (balance spacer) -->
  <div class="hud-row hud-secondary">

    <div class="hud-round">
      <span class="hud-round-lbl">Round</span>
      <span class="hud-round-val" id="hud-round-num">1</span>
    </div>

    <div class="hud-chain-wrap">
      <span class="hud-chain-val" id="hud-chain">&#215;1.00</span>
      <span class="hud-chain-lbl">Chain</span>
    </div>

    <button id="btn-end-round" class="hud-end-round-btn" aria-label="End round early"></button>

  </div>
</div>

<!-- ── Stats mini panel ─────────────────────────────────────────── -->
<div id="stats-mini" class="hidden">
  <div class="stats-mini-grid">
    <div class="smt">
      <span class="smt-val" id="smt-popped">–</span>
      <span class="smt-lbl">Popped</span>
    </div>
    <div class="smt">
      <span class="smt-val" id="smt-chain">–</span>
      <span class="smt-lbl">Best Chain</span>
    </div>
    <div class="smt">
      <span class="smt-val" id="smt-payout">–</span>
      <span class="smt-lbl">Best Payout</span>
    </div>
    <div class="smt">
      <span class="smt-val" id="smt-earned">–</span>
      <span class="smt-lbl">Run Earned</span>
    </div>
  </div>
  <button id="stats-full-btn" class="stats-full-btn">Full Stats ›</button>
</div>

<!-- ── Full stats screen ────────────────────────────────────────── -->
<div id="stats-screen" class="hidden">
  <div class="stats-screen-header">
    <span class="stats-screen-title">◆ Stats</span>
    <button id="stats-screen-close" aria-label="Close">&#215;</button>
  </div>
  <div class="stats-tab-bar">
    <button class="stats-tab active" data-tab="run">Run</button>
    <button class="stats-tab" data-tab="alltime">All-Time</button>
    <button class="stats-tab" data-tab="bycolor">By Color</button>
  </div>
  <div id="stats-tab-body"></div>
</div>

<!-- ── Shop panel (full-screen overlay) ─────────────────────────── -->
<div id="shop-panel" class="hidden">
  <div class="shop-inner">
    <div class="shop-header">
      <div class="shop-title-wrap">
        <span class="shop-header-icon">&#11042;</span>
        <span class="shop-title">Upgrades</span>
      </div>
      <button id="shop-close" aria-label="Close">&#215;</button>
    </div>
    <div id="shop-body"><!-- built by JS --></div>
  </div>
</div>

<!-- all round info is in #hud -->

<!-- ── Quick-buy bar (always visible, bottom) ───────────────────── -->
<div id="quick-buy-bar">
  <button id="qb-ball" class="qb-btn">
    <span class="qb-btn-icon" id="qb-ball-icon">&#9670;</span>
    <span class="qb-btn-label" id="qb-ball-label">BALL</span>
    <span class="qb-btn-cost" id="qb-ball-cost">&#9670; –</span>
  </button>
  <button id="qb-buy" class="qb-btn">
    <span class="qb-btn-icons">
      <span class="qb-btn-icon" id="qb-buy-ball-icon">&#9670;</span>
      <span class="qb-btn-icon" id="qb-buy-icon">&#9889;</span>
    </span>
    <span class="qb-btn-label" id="qb-buy-label">BUY</span>
    <span class="qb-btn-cost" id="qb-buy-cost">&#9670; –</span>
  </button>
  <button id="qb-store" class="qb-btn qb-btn-store">
    <span class="qb-btn-icon" id="qb-store-arrow">&#9650;</span>
    <span class="qb-btn-label">UPGRADES</span>
  </button>
</div>

<!-- ── Round-end overlay ────────────────────────────────────────── -->
<div id="round-end-overlay" class="hidden">
  <div class="reo-card">
    <div class="reo-title" id="reo-title">Round Complete</div>
    <div class="reo-body" id="reo-body"></div>
    <div class="reo-actions" id="reo-actions"></div>
  </div>
</div>

<!-- ── Boss reward overlay ───────────────────────────────────────── -->
<div id="boss-reward-overlay" class="hidden">
  <div class="reo-card">
    <div class="reo-title">&#9733; Act Complete!</div>
    <div class="reo-body" id="boss-reward-body"></div>
    <div class="reo-actions">
      <button class="reo-btn reo-btn-primary" id="boss-reward-continue">Enter Store &#8250;</button>
    </div>
  </div>
</div>

<!-- ── Between-round store (placeholder) ────────────────────────── -->
<div id="between-store" class="hidden">
  <div class="bstore-inner">
    <div class="bstore-header">
      <span class="bstore-title" id="bstore-title">&#9733; Run Store</span>
    </div>
    <div class="bstore-body">
      <p class="bstore-coming-soon">More upgrades coming soon.</p>
      <button id="bstore-continue" class="reo-btn reo-btn-primary">Continue &#8250;</button>
    </div>
  </div>
</div>

<!-- ── Dev panel ────────────────────────────────────────────────── -->
<div id="dev-panel" class="hidden">
  <div class="dev-header">
    Dev
    <button id="dev-close" aria-label="Close">&#215;</button>
  </div>
  <div class="dev-body">
    <div id="dev-analytics-status" class="dev-analytics-status">&#8230;</div>
    <div class="dev-analytics-status" style="letter-spacing:0.14em;">Seed: <span id="dev-run-seed" style="color:rgba(255,229,102,0.75);">–</span></div>
    <div class="dev-row-btns">
      <button id="dev-add-coins" class="dev-small-btn">&#9670; +1 000</button>
      <button id="dev-reset"     class="dev-small-btn">&#8635; Reset</button>
    </div>
    <div class="dev-row-btns">
      <button id="dev-prestige"  class="dev-small-btn">&#9733; Prestige</button>
      <button id="dev-new-run"   class="dev-small-btn">&#9654; New Run</button>
    </div>
    <div class="dev-row-btns">
      <button id="dev-reset-intro" class="dev-small-btn">&#8617; Intro</button>
    </div>
    <div class="dev-row-btns">
      <button id="dev-free-upgrades" class="dev-small-btn">&#10022; Free Upgrades</button>
    </div>
    <div class="dev-row-btns">
      <button id="dev-export-telemetry" class="dev-small-btn">&#8595; Telemetry</button>
      <button id="dev-ignore-device"    class="dev-small-btn">&#128683; Ignore Device</button>
    </div>

    <!-- ── Feel-tuning sliders ────────────────────────────── -->
    <div class="dev-section">
      <button class="dev-section-hdr" id="dev-feel-hdr">&#9881; Feel &#9658;</button>
      <div class="dev-section-body hidden" id="dev-feel-body">
        <div class="dev-slider-row">
          <span class="dev-slider-lbl">Grow <b id="dev-grow-val">–</b> ms</span>
          <input type="range" class="dev-slider" id="dev-grow" min="50" max="1000" step="10">
        </div>
        <div class="dev-slider-row">
          <span class="dev-slider-lbl">Hold <b id="dev-hold-val">–</b> ms</span>
          <input type="range" class="dev-slider" id="dev-hold" min="50" max="3000" step="10">
        </div>
        <div class="dev-slider-row">
          <span class="dev-slider-lbl">Shrink <b id="dev-shrink-val">–</b> ms</span>
          <input type="range" class="dev-slider" id="dev-shrink" min="50" max="800" step="10">
        </div>
        <div class="dev-slider-row">
          <span class="dev-slider-lbl">Speed <b id="dev-speed-val">–</b></span>
          <input type="range" class="dev-slider" id="dev-speed" min="0.05" max="2.00" step="0.01">
        </div>
        <div class="dev-row-btns">
          <button class="dev-small-btn" id="dev-feel-reset">&#8635; Reset</button>
        </div>
      </div>
    </div>
  </div>
</div>

<button id="dev-toggle" aria-label="Dev">&#9881;</button>

<!-- ── Debug overlay (toggle with D key) ────────────────────────── -->
<div id="debug-overlay" class="hidden"></div>

<script type="module" src="/src/main.js"></script>
</body>
</html>
